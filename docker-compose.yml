services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gedda
      POSTGRES_PASSWORD: gedda
      POSTGRES_DB: gedda_iq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gedda -d gedda_iq"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      # Must match the host-side port browsers hit.
      # If you deploy to a real domain, change to https://yourdomain.com
      # Override via .env file or shell: FRONTEND_URL=http://1.2.3.4:3000 docker compose up
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://gedda:gedda@postgres:5432/gedda_iq}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: "http://backend:4000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
