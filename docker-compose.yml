services:

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      # Must match the host-side port browsers hit.
      # If you deploy to a real domain, change to https://yourdomain.com
      # Override via .env file or shell: FRONTEND_URL=http://1.2.3.4:3000 docker compose up
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
